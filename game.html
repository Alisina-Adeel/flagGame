<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="doc/favicon.png">
<meta charset="UTF-8">
<title>Flag Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

/* SCREEN */
.screen {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}

/* START SCREEN */
.start-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 20px;
}

.start-screen button {
  padding: 14px 24px;
  margin-top: 20px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  color: black;
  font-size: 16px;
  cursor: pointer;
  width: 100%;
  max-width: 250px;
}

/* GRID (CONTINENTS) */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  max-width: 800px;
  margin: 20px auto;
  padding: 0 10px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  padding: 16px;
  border-radius: 15px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
  border: 1px solid #38bdf8;
}

/* FLAG */
#flag {
  width: 100%;
  max-width: 260px;
  height: auto;
  border-radius: 10px;
  margin: 20px auto;
  display: block;
}

/* OPTIONS */
#options button {
  display: block;
  width: 90%;
  max-width: 300px;
  margin: 10px auto;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #38bdf8;
  cursor: pointer;
  font-size: 15px;
}

/* RESULT */
#result {
  margin-top: 10px;
  font-weight: bold;
}

/* PLAYER INFO */
#playerInfo {
  font-size: 18px;
}

/* ================= RESPONSIVE BREAKPOINTS ================= */

/* Tablets */
@media (max-width: 768px) {
  .grid {
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  }

  #playerInfo {
    font-size: 16px;
  }
}

/* Mobile */
@media (max-width: 480px) {
  body {
    font-size: 14px;
  }

  .card {
    padding: 12px;
  }

  #flag {
    max-width: 200px;
  }

  #options button {
    width: 100%;
  }
}
</style>
</head>

<body>

<h2 id="playerInfo"></h2>

<h3>Select a Continent 🌍</h3>
<div class="grid" id="continentGrid"></div>

<hr style="margin:30px 0; border-color:#334155">

<img id="flag" src="" alt="flag">
<div id="options"></div>
<p id="result"></p>

<script>
    /* PLAYER */
const playerName = localStorage.getItem("playerName") || "Player";
let score = 0;

function updatePlayer() {
  document.getElementById("playerInfo").innerText =
    playerName + " - Score: " + score;
}

updatePlayer();

/* CONTINENT MAP (FIXED + MORE COMPLETE) */
const continentMap = {
  canada: "Americas",
  "united states": "Americas",
  brazil: "Americas",
  mexico: "Americas",

  france: "Europe",
  germany: "Europe",
  italy: "Europe",
  "united kingdom": "Europe",
  spain: "Europe",

  japan: "Asia",
  china: "Asia",
  india: "Asia",
  thailand: "Asia",

  nigeria: "Africa",
  egypt: "Africa",
  kenya: "Africa",
  ghana: "Africa",

  australia: "Oceania",
  "new zealand": "Oceania",
  fiji: "Oceania",
  "papua new guinea": "Oceania"
};

/* ALL COUNTRIES (AUTO FROM MAP) */
const allCountries = Object.keys(continentMap);

let countries = [];
let countryData = [];
let correctAnswer = "";

/* LOAD CONTINENTS */
function loadContinents() {
  const continents = ["Asia","Europe","Africa","Americas","Oceania","All"];
  const grid = document.getElementById("continentGrid");

  grid.innerHTML = "";

  continents.forEach(cont => {
    grid.innerHTML += `
      <div class="card" onclick="selectContinent('${cont}')">
        <h3>${cont}</h3>
      </div>
    `;
  });
}

/* SELECT CONTINENT */
function selectContinent(cont) {
  if (cont === "All") {
    countries = allCountries;
  } else {
    countries = allCountries.filter(c => continentMap[c] === cont);
  }

  loadCountries();
}

/* LOAD COUNTRIES SAFELY */
function loadCountries() {
  countryData = [];

  let loaded = 0;

  countries.forEach(name => {
    fetch(`https://restcountries.com/v3.1/name/${name}`)
      .then(res => res.json())
      .then(data => {
        if (!data || !data[0]) return;

        const c = data[0];

        countryData.push({
          name: c.name.common,
          flag: c.flags?.png
        });

        loaded++;

        if (loaded === countries.length) {
          nextQuestion();
        }
      })
      .catch(() => {
        loaded++; // still continue if error

        if (loaded === countries.length) {
          nextQuestion();
        }
      });
  });
}

/* NEXT QUESTION */
function nextQuestion() {
  document.getElementById("result").innerText = "";

  const correct = countryData[Math.floor(Math.random() * countryData.length)];
  correctAnswer = correct.name;

  document.getElementById("flag").src = correct.flag;

  let options = [correct.name];

  while (options.length < 4) {
    const random =
      countryData[Math.floor(Math.random() * countryData.length)].name;

    if (!options.includes(random)) options.push(random);
  }

  options.sort(() => Math.random() - 0.5);

  const box = document.getElementById("options");
  box.innerHTML = "";

  options.forEach(name => {
    const btn = document.createElement("button");
    btn.innerText = name;
    btn.onclick = () => checkAnswer(name);
    box.appendChild(btn);
  });
}

/* CHECK */
function checkAnswer(selected) {
  if (selected === correctAnswer) {
    score++;
    document.getElementById("result").innerText = "✅ Correct!";
  } else {
    document.getElementById("result").innerText =
      "❌ Wrong! Answer: " + correctAnswer;
  }

  updatePlayer();
  setTimeout(nextQuestion, 1000);
}

/* START */
loadContinents();
</script>

</body>
</html>
